/* Dashboard refinements */
.dashboard-filter-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 0 0 18px;
  box-shadow: var(--shadow);
}
.dashboard-filter-card .filter-copy {
  min-width: 220px;
}
.dashboard-filter-card .filter-title {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--navy);
  margin: 0;
}
.dashboard-filter-card .filter-sub {
  font-size: 12px;
  color: var(--grey-700);
  margin: 2px 0 0;
}
.segmented-period {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}
.period-btn {
  border: 1px solid var(--border);
  background: var(--grey-50);
  color: var(--grey-700);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.period-btn:hover {
  border-color: var(--blue);
  color: var(--navy);
  background: white;
}
.period-btn.active {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}
.metric-note {
  background: #F8FAFC;
  border: 1px solid var(--border);
  border-left: 4px solid var(--blue);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--grey-700);
  font-size: 12px;
  line-height: 1.45;
  margin: -4px 0 16px;
}
.card.kpi .sub strong {
  color: var(--navy);
}
@media (max-width: 760px) {
  .dashboard-filter-card {
    align-items: flex-start;
    flex-direction: column;
  }
  .segmented-period {
    justify-content: flex-start;
  }
}


/* Reporting insight layout */
.insight-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.insight-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
}
.insight-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--grey-700);
  font-weight: 800;
  margin: 0;
}
.insight-card .value {
  font-size: 24px;
  font-weight: 800;
  color: var(--navy);
  margin-top: 5px;
}
.insight-card .sub {
  font-size: 11px;
  color: var(--grey-400);
  margin-top: 2px;
}
.section-intro {
  font-size: 12px;
  color: var(--grey-700);
  line-height: 1.45;
  margin: -4px 0 14px;
}
.report-summary-band {
  border: 1px solid var(--border);
  border-left: 5px solid var(--gold);
  background: #FFFBEB;
  border-radius: 10px;
  padding: 12px 14px;
  margin: 14px 0 18px;
  font-size: 12px;
  color: #374151;
  line-height: 1.5;
}
@media (max-width: 980px) {
  .insight-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 620px) {
  .insight-grid { grid-template-columns: 1fr; }
}

<script>
const DEMO_MODE = SUPABASE_URL.includes('PLACEHOLDER');
const sb = DEMO_MODE ? null : supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'implicit' }});
const AGENCIES = [{id:'apla',name:'APLA Health'},{id:'ncjw',name:'NCJW | LA'},{id:'city',name:'City of West Hollywood'}];
const FY='FY26';
const HH_COMPOSITION=['Single Adult','Adult Couple (no children)','Single Parent w/ Children','Two Parents w/ Children','Multi-generational','Other'];
const HOUSING_STATUS_INTAKE=['Permanently Housed - Lease in own name','Permanently Housed - On lease w/ others','Doubled-up / Couch Surfing','Rental w/ Eviction Notice','Hotel/Motel (self-pay)','Subsidized Housing','Other'];
const HOUSING_STATUS_FULL=[...HOUSING_STATUS_INTAKE.slice(0,5),'Emergency Shelter','Transitional Housing','Unsheltered',...HOUSING_STATUS_INTAKE.slice(5)];
const HOUSING_EXIT_OPTIONS=HOUSING_STATUS_FULL;
const HOUSING_INTAKE=HOUSING_STATUS_INTAKE;
const QUALIFYING_EVENT=['Loss of Employment','Reduction in Income','Medical Emergency','Domestic Violence','Death of Household Member','Disability Onset','Eviction Notice','Utility Shutoff','Family Conflict','Natural Disaster','Other'];
const RACE_ETHNICITY=['American Indian or Alaska Native','Asian','Black or African American','Hispanic or Latino/a/e','Middle Eastern or North African','Native Hawaiian or Pacific Islander','White','Multi-racial','Client Declined','Unknown'];
const GENDER=['Female','Male','Non-binary','Other','Client Declined'];
const ASSISTANCE_TYPE=['Rental Arrears','Forward Rent','Security Deposit','Utility Assistance','Moving Costs','Application Fees','Furniture/Household Goods','Other'];
const SERVICE_CATEGORY=['Intake Assessment','Case Management','Housing Search Support','Landlord Mediation','Benefits Enrollment','Employment Support','Financial Counseling','Legal Referral','Mental Health Referral','Follow-up Check-in','Other'];
let state={session:null,profile:null,households:[],users:[],activity:[],submissions:[],fiscal:{},currentId:null,charts:{},agencyFilter:'all',dashboardQuarter:'all',reportQuarter:'Q4-2026',reportAgency:'all',fiscalAgency:'ncjw',fiscalMonth:'April'};
const REPORT_QUARTERS={
  'Q1-2026':{label:'Q1',fy:'FY 2025–26',period:'October 1 – December 31, 2025',start:'2025-10-01',end:'2025-12-31'},
  'Q2-2026':{label:'Q2',fy:'FY 2025–26',period:'January 1 – March 31, 2026',start:'2026-01-01',end:'2026-03-31'},
  'Q3-2026':{label:'Q3',fy:'FY 2025–26',period:'April 1 – June 30, 2026',start:'2026-04-01',end:'2026-06-30'},
  'Q4-2026':{label:'Q4',fy:'FY 2025–26',period:'July 1 – September 30, 2026',start:'2026-07-01',end:'2026-09-30'}
};
function redirectUrl(){return APP_REDIRECT_URL || (window.location.origin+window.location.pathname)}function cleanUrl(){if(location.hash.includes('access_token')) history.replaceState({},document.title,redirectUrl())}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function escJs(s){return esc(String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"))}function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,10)}function money(n){return '$'+Math.round(Number(n)||0).toLocaleString()}function pct(n){return !n?'0%':(n*100).toFixed(0)+'%'}function agencyName(id){return (AGENCIES.find(a=>a.id===id)||{}).name||id||'—'}function isCity(){return state.profile&&['city_admin','city_viewer'].includes(state.profile.user_type)}function isAdmin(){return state.profile&&state.profile.user_type==='city_admin'}function canExportData(){return state.profile&&['city_admin','agency_admin'].includes(state.profile.user_type)}function toast(m,k=''){let t=document.getElementById('toast');t.textContent=m;t.className='toast show '+k;setTimeout(()=>t.className='toast',2600)}
let _undoBuffer=null,_undoTimer=null;
function showUndoToast(msg,restoreFn){_undoBuffer=restoreFn;clearTimeout(_undoTimer);let t=document.getElementById('undo-toast');if(!t)return;t.querySelector('.undo-msg').textContent=msg;t.classList.add('show');_undoTimer=setTimeout(()=>{t.classList.remove('show');_undoBuffer=null},8000)}
async function performUndo(){let t=document.getElementById('undo-toast');if(t)t.classList.remove('show');clearTimeout(_undoTimer);let fn=_undoBuffer;_undoBuffer=null;if(fn)await fn()}

function fiscalQuarter(d){if(!d)return'';let x=new Date(d+'T00:00:00');if(isNaN(x))return'';let t=x.toISOString().slice(0,10);for(const [key,q] of Object.entries(REPORT_QUARTERS)){if(t>=q.start&&t<=q.end)return q.label+' '+q.fy}let m=x.getMonth()+1;let y=x.getFullYear();if(m>=10)return 'Q1 FY '+(y+1);if(m<=3)return 'Q2 FY '+y;if(m<=6)return 'Q3 FY '+y;return 'Q4 FY '+y}function dateOnly(v){return v?String(v).slice(0,10):''}
function betweenDates(d,start,end){d=dateOnly(d);return !!d&&d>=start&&d<=end}
function todayStr(){return new Date().toISOString().slice(0,10)}
function overlapsQuarter(start,end,q){let s=dateOnly(start),e=dateOnly(end)||todayStr();if(!s)return false;return s<=q.end&&e>=q.start}
function inReportQuarter(h,key=state.reportQuarter){
  let q=REPORT_QUARTERS[key];
  if(!q||!h)return false;

  // Count households opened during the quarter.
  if(betweenDates(h.intake_date,q.start,q.end)) return true;

  // Count households receiving financial assistance during the quarter.
  if(betweenDates(h.assistance_start,q.start,q.end)||betweenDates(h.assistance_end,q.start,q.end)||overlapsQuarter(h.assistance_start,h.assistance_end,q)) return true;

  // Count assistance/service log activity during the quarter.
  if((h.assistance_log||[]).some(e=>betweenDates(e.date,q.start,q.end))) return true;
  if((h.service_log||[]).some(e=>betweenDates(e.date,q.start,q.end))) return true;

  // Count records that were already open before/through the period and not clearly closed before the period.
  // (Capped at today's date so a still-open case isn't counted into future quarters that haven't happened yet.)
  if(h.intake_date && dateOnly(h.intake_date)<=q.end && q.start<=todayStr() && (!h.assistance_end || dateOnly(h.assistance_end)>=q.start)) return true;

  return false;
}function ageBand(a){a=Number(a);if(!a)return'';if(a<18)return'Under 18';if(a<25)return'18-24';if(a<35)return'25-34';if(a<45)return'35-44';if(a<55)return'45-54';if(a<62)return'55-61';return'62+'}function stable(h){let ok=s=>s&&(s.includes('Permanently')||s.includes('Subsidized'));if(!h.housing_at_exit||!h.housing_90day)return'pending';return ok(h.housing_at_exit)&&ok(h.housing_90day)?'stable':'unstable'}function assistTotal(h){return (h.assistance_log||[]).reduce((s,e)=>s+Number(e.amount||0),0)}function sessions(h){return (h.service_log||[]).length}function scopedHouseholds(){if(isCity()&&state.agencyFilter!=='all')return state.households.filter(h=>h.agency_id===state.agencyFilter);return state.households}
function canDeleteHH(h){return isCity() || (state.profile&&h.agency_id===state.profile.agency_id)}
function outcomeSummary(h){let exited=h.filter(x=>x.housing_at_exit).length,active=h.length-exited,stableCount=h.filter(x=>stable(x)==='stable').length,unstableCount=h.filter(x=>stable(x)==='unstable').length,pending=h.filter(x=>stable(x)==='pending').length;return {active,exited,stableCount,unstableCount,pending,base:stableCount+unstableCount}}
function quarterMetrics(h,key=state.reportQuarter){
  let q=REPORT_QUARTERS[key];
  let newIntakes=h.filter(x=>betweenDates(x.intake_date,q.start,q.end)).length;
  let closedCases=h.filter(x=>betweenDates(x.assistance_end,q.start,q.end)||!!x.housing_at_exit).length;
  let ongoingCases=h.filter(x=>{
    let intake=dateOnly(x.intake_date);
    let end=dateOnly(x.assistance_end);
    return intake && intake<=q.end && (!end || end>=q.start);
  }).length;
  return {newIntakes,closedCases,ongoingCases};
}

async function init(){document.getElementById('login-form').onsubmit=login;document.getElementById('reset-password-btn').onclick=sendPasswordReset;document.getElementById('reset-password-form').onsubmit=updatePassword;document.getElementById('logout-btn').onclick=logout;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>nav(b.dataset.view));document.getElementById('user-form').onsubmit=saveUser;if(DEMO_MODE){state.session={user:{email:'fgomez@weho.org'}};state.profile={email:'fgomez@weho.org',name:'Francisco Gomez',agency_id:'city',user_type:'city_admin',active:true};loadLocal();showApp();return}if(location.hash.includes('access_token')) await new Promise(r=>setTimeout(r,400));let isRecovery=location.hash.includes('type=recovery');let {data}=await sb.auth.getSession();if(isRecovery&&data.session){state.session=data.session;showResetPassword()}else if(data.session){state.session=data.session;await loadProfile();cleanUrl();showApp()}else showLogin();sb.auth.onAuthStateChange(async(e,s)=>{if(e==='SIGNED_OUT')showLogin();if(e==='PASSWORD_RECOVERY'&&s){state.session=s;showResetPassword();return}if(s&&e==='SIGNED_IN'){state.session=s;if(location.hash.includes('type=recovery')){showResetPassword();return}await loadProfile();cleanUrl();showApp()}})}
async function login(e){e.preventDefault();let email=document.getElementById('login-email').value.trim().toLowerCase(),password=document.getElementById('login-password').value,msg=document.getElementById('login-msg');msg.className='msg info';msg.textContent='Signing in…';if(DEMO_MODE){showApp();return}let {data,error}=await sb.auth.signInWithPassword({email,password});if(error){msg.className='msg err';msg.textContent='Sign-in failed: '+error.message+'. If you have not created a password yet, use “Forgot password / set first password.”'}else{state.session=data.session;await loadProfile();showApp()}}
async function sendPasswordReset(){let email=document.getElementById('login-email').value.trim().toLowerCase(),msg=document.getElementById('login-msg');if(!email){msg.className='msg err';msg.textContent='Enter your email address first, then click forgot password.';return}msg.className='msg info';msg.textContent='Sending password setup email…';if(DEMO_MODE){msg.className='msg ok';msg.textContent='Demo mode: password reset email skipped.';return}let {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:redirectUrl()});if(error){msg.className='msg err';msg.textContent='Password reset failed: '+error.message}else{msg.className='msg ok';msg.textContent='Check your inbox for a password setup link. If you do not see it, check spam/junk.'}}
function showResetPassword(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.add('hidden');document.getElementById('reset-password').classList.remove('hidden')}
async function updatePassword(e){e.preventDefault();let p=document.getElementById('new-password').value,c=document.getElementById('confirm-password').value,msg=document.getElementById('reset-msg');if(p!==c){msg.className='msg err';msg.textContent='Passwords do not match.';return}if(p.length<8){msg.className='msg err';msg.textContent='Password must be at least 8 characters.';return}msg.className='msg info';msg.textContent='Saving password…';let {error}=await sb.auth.updateUser({password:p});if(error){msg.className='msg err';msg.textContent='Password update failed: '+error.message;return}msg.className='msg ok';msg.textContent='Password saved. Loading portal…';await loadProfile();cleanUrl();showApp()}
async function logout(){if(!DEMO_MODE)await sb.auth.signOut();state={session:null,profile:null,households:[],users:[],activity:[],submissions:[],fiscal:{},currentId:null,charts:{},agencyFilter:'all',dashboardQuarter:'all',reportQuarter:'Q4-2026',reportAgency:'all',fiscalAgency:'ncjw',fiscalMonth:'April'};showLogin()}function showLogin(){document.getElementById('reset-password').classList.add('hidden');document.getElementById('login').classList.remove('hidden');document.getElementById('app').classList.add('hidden')}function showApp(){document.getElementById('reset-password').classList.add('hidden');document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('user-pill').textContent=state.profile.name||state.profile.email;document.getElementById('agency-pill').textContent=agencyName(state.profile.agency_id);document.getElementById('role-pill').textContent=state.profile.user_type.replace('_',' ');document.querySelectorAll('.admin-only').forEach(x=>x.classList.toggle('hidden',!isAdmin()));document.querySelectorAll('.export-only').forEach(x=>x.classList.toggle('hidden',!canExportData()));loadAll().then(()=>nav('home'))}
async function loadProfile(){let email=(state.session?.user?.email||'').toLowerCase();let {data,error}=await sb.rpc('rphp_get_my_profile');if(error){console.error('Profile lookup failed',error);let fallback=await sb.from('rphp_users').select('*').ilike('email',email).eq('active',true).maybeSingle();data=fallback.data;error=fallback.error}if(error||!data){await sb.auth.signOut();throw new Error('No active RPHP user profile found for '+email+'. Run the latest SQL setup and confirm this email is listed as active in rphp_users.')}state.profile=Array.isArray(data)?data[0]:data}
function loadLocal(){state.households=JSON.parse(localStorage.rphp_households||'[]');state.users=[state.profile];state.activity=JSON.parse(localStorage.rphp_activity||'[]');state.submissions=JSON.parse(localStorage.rphp_submissions||'[]');state.fiscal=JSON.parse(localStorage.rphp_fiscal||'{}')}function saveLocal(){localStorage.rphp_households=JSON.stringify(state.households);localStorage.rphp_activity=JSON.stringify(state.activity);localStorage.rphp_submissions=JSON.stringify(state.submissions||[]);localStorage.rphp_fiscal=JSON.stringify(state.fiscal||{})}
async function loadAll(){if(DEMO_MODE){loadLocal();return}let h=await sb.from('rphp_households').select('*').order('created_at',{ascending:false});if(h.error)toast('Households load error: '+h.error.message,'err');state.households=h.data||[];let a=await sb.from('rphp_activity_log').select('*').order('created_at',{ascending:false}).limit(50);state.activity=a.data||[];if(isAdmin())await loadUsers();let s=await sb.from('rphp_report_submissions').select('*').order('submitted_at',{ascending:false}).limit(100);state.submissions=s.error?[]:(s.data||[]);await loadFiscalData()}
async function loadUsers(){if(DEMO_MODE)return;let {data,error}=await sb.rpc('rphp_get_users');if(error){toast('User table load error: '+error.message,'err');state.users=[]}else state.users=data||[]}
function cleanDate(v){return v && /^\d{4}-\d{2}-\d{2}$/.test(String(v)) ? v : null}
function cleanNumber(v){return v===null||v===undefined||v==='' ? null : Number(v)}
function householdPayload(h){
  return {
    id: h.id,
    hh_id: h.hh_id || '',
    agency_id: isCity() ? h.agency_id : state.profile.agency_id,
    intake_date: cleanDate(h.intake_date),
    hh_composition: h.hh_composition || null,
    hh_size: cleanNumber(h.hh_size),
    monthly_income: cleanNumber(h.monthly_income),
    housing_at_intake: h.housing_at_intake || null,
    age_primary: cleanNumber(h.age_primary),
    race_ethnicity: h.race_ethnicity || null,
    gender: h.gender || null,
    transgender_optional: h.transgender_optional || null,
    veteran: h.veteran || null,
    disability: h.disability || null,
    eligible: h.eligible || null,
    qualifying_event: h.qualifying_event || null,
    assistance_start: cleanDate(h.assistance_start),
    assistance_end: cleanDate(h.assistance_end),
    arrears_flag: h.arrears_flag || null,
    arrears_amount: cleanNumber(h.arrears_amount) || 0,
    benefits_cert: h.benefits_cert || null,
    housing_at_entry: h.housing_at_entry || null,
    housing_at_exit: h.housing_at_exit || null,
    housing_90day: h.housing_90day || null,
    success_story: h.success_story || null,
    assistance_log: Array.isArray(h.assistance_log) ? h.assistance_log.map(x=>({
      date: cleanDate(x.date),
      type: x.type || '',
      amount: cleanNumber(x.amount) || 0,
      notes: x.notes || ''
    })) : [],
    service_log: Array.isArray(h.service_log) ? h.service_log.map(x=>({
      date: cleanDate(x.date),
      category: x.category || x.type || '',
      notes: x.notes || ''
    })) : [],
    created_at: h.created_at || new Date().toISOString(),
    updated_at: new Date().toISOString(),
    updated_by: state.profile.email
  }
}
function validateHH(h){
  const missing=[];
  clearFieldErrors();
  if(!h.hh_id){missing.push('Household ID');markFieldError('hh_id')}
  if(!h.agency_id){missing.push('Agency');markFieldError('agency_id')}
  if(missing.length){toast('Please complete: '+missing.join(', '),'err');return false}
  return true
}
function markFieldError(k){let el=document.getElementById('fld-'+k);if(el){el.classList.add('error');if(!document.querySelector('.field.error[data-scrolled]')){el.setAttribute('data-scrolled','1');el.scrollIntoView({behavior:'smooth',block:'center'})}}}
function clearFieldErrors(){document.querySelectorAll('.field.error').forEach(el=>{el.classList.remove('error');el.removeAttribute('data-scrolled')})}
let _autosaveTimer=null;
function setAutosaveStatus(s){let el=document.getElementById('autosave-status');if(!el)return;el.className='autosave-status '+s;el.textContent=s==='saving'?'Saving…':s==='saved'?'Saved':s==='error'?'Save failed':''}
function scheduleAutosave(){clearTimeout(_autosaveTimer);setAutosaveStatus('saving');_autosaveTimer=setTimeout(async()=>{let h=current();if(!h)return;if(!h.hh_id||!h.agency_id){setAutosaveStatus('');return}let ok=await persistHH(h);setAutosaveStatus(ok?'saved':'error')},900)}

async function persistHH(h){
  if(!validateHH(h)) return false;
  const payload=householdPayload(h);
  if(DEMO_MODE){let i=state.households.findIndex(x=>x.id===payload.id);if(i>=0)state.households[i]=payload;else state.households.unshift(payload);saveLocal();return true}
  let {error}=await sb.from('rphp_households').upsert(payload,{onConflict:'id'}).select('id').single();
  if(error){
    console.error('Household save failed', error, payload);
    toast('Save failed: '+(error.message||'Unknown Supabase error'),'err');
    return false
  }
  await logAct('Saved household',payload.hh_id,payload.agency_id);
  await loadAll();
  return true
}
async function logAct(action,hh,agency){let row={id:uid('act'),action,hh_id:hh||null,agency_id:agency||null,actor_email:state.profile.email,created_at:new Date().toISOString()};if(DEMO_MODE){state.activity.unshift(row);saveLocal();return}let {error}=await sb.from('rphp_activity_log').insert(row);if(error)console.warn('Activity log insert failed',error)}
function nav(v){document.querySelectorAll('.view').forEach(s=>s.classList.add('hidden'));document.getElementById('view-'+v).classList.remove('hidden');document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v));if(v==='home')renderHome();if(v==='dashboard')renderDashboard();if(v==='households')renderHHList();if(v==='export')renderExport();if(v==='fiscal')renderFiscal();if(v==='users')renderUsers();if(v==='activity')renderActivity();if(v==='backup')renderBackup()}

function agencyFilterHtml(){if(!isCity())return'';return`<div class="toolbar"><div class="filters"><label><strong>Agency view:</strong></label><select onchange="state.agencyFilter=this.value;renderCurrent()"><option value="all" ${state.agencyFilter==='all'?'selected':''}>All agencies</option><option value="apla" ${state.agencyFilter==='apla'?'selected':''}>APLA Health</option><option value="ncjw" ${state.agencyFilter==='ncjw'?'selected':''}>NCJW | LA</option></select></div></div>`}function filterLabel(){return isCity()?(state.agencyFilter==='all'?'APLA + NCJW':agencyName(state.agencyFilter)):agencyName(state.profile.agency_id)}function renderCurrent(){let v=document.querySelector('.view:not(.hidden)').id.replace('view-','');nav(v)}

function fyRange(){
  return {start:REPORT_QUARTERS['Q1-2026'].start,end:REPORT_QUARTERS['Q4-2026'].end};
}
function ytdHouseholds(){
  let fy=fyRange();
  return scopedHouseholds().filter(x=>{
    if(betweenDates(x.intake_date,fy.start,fy.end)) return true;
    if(betweenDates(x.assistance_start,fy.start,fy.end)||betweenDates(x.assistance_end,fy.start,fy.end)||overlapsQuarter(x.assistance_start,x.assistance_end,fy)) return true;
    if((x.assistance_log||[]).some(e=>betweenDates(e.date,fy.start,fy.end))) return true;
    if((x.service_log||[]).some(e=>betweenDates(e.date,fy.start,fy.end))) return true;
    return x.intake_date && dateOnly(x.intake_date)<=fy.end && (!x.assistance_end || dateOnly(x.assistance_end)>=fy.start);
  });
}
function quarterHouseholds(key=state.dashboardQuarter){
  if(key==='all') return ytdHouseholds();
  return scopedHouseholds().filter(x=>inReportQuarter(x,key));
}
function metricsFor(h,key){
  let range = key==='all' ? fyRange() : REPORT_QUARTERS[key];
  let newIntakes=h.filter(x=>betweenDates(x.intake_date,range.start,range.end)).length;
  let closedCases=h.filter(x=>betweenDates(x.assistance_end,range.start,range.end)||(x.housing_at_exit&&(!x.assistance_end||betweenDates(x.assistance_end,range.start,range.end)))).length;
  let activeAtEnd=h.filter(x=>{
    let intake=dateOnly(x.intake_date);
    let end=dateOnly(x.assistance_end);
    return intake && intake<=range.end && (!end || end>range.end) && !x.housing_at_exit;
  }).length;
  let assistance=h.reduce((sum,x)=>sum+(x.assistance_log||[]).filter(e=>betweenDates(e.date,range.start,range.end)).reduce((s,e)=>s+Number(e.amount||0),0),0);
  let services=h.reduce((sum,x)=>sum+(x.service_log||[]).filter(e=>betweenDates(e.date,range.start,range.end)).length,0);
  return {newIntakes,closedCases,activeAtEnd,assistance,services};
}
function supportReasonRows(h){
  return breakdownRows(QUALIFYING_EVENT,h,x=>x.qualifying_event);
}
function assistanceRowsFor(h,key){
  let range = key==='all' ? fyRange() : REPORT_QUARTERS[key];
  let map={};
  h.forEach(x=>(x.assistance_log||[]).forEach(e=>{
    if(betweenDates(e.date,range.start,range.end)){
      let k=e.type||'Other / Unknown';
      map[k]=(map[k]||0)+Number(e.amount||0);
    }
  }));
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${money(v)}</td></tr>`).join('')||'<tr><td colspan="2">No assistance logged for this period.</td></tr>';
}
function serviceRowsFor(h,key){
  let range = key==='all' ? fyRange() : REPORT_QUARTERS[key];
  let map={};
  h.forEach(x=>(x.service_log||[]).forEach(e=>{
    if(betweenDates(e.date,range.start,range.end)){
      let k=e.category||e.type||'Other / Unknown';
      map[k]=(map[k]||0)+1;
    }
  }));
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')||'<tr><td colspan="2">No service activity logged for this period.</td></tr>';
}

function renderDashboard(){

    return _renderDashboardImpl();
  } catch(err) {

    let el=document.getElementById('view-dashboard');
    if(el) el.innerHTML=`<div class="page-head"><div><h1 class="page-title">Dashboard</h1><p class="page-sub">This section could not load because of a page error.</p></div></div><div class="notice" style="background:#FEE2E2;border:1px solid #FCA5A5;color:#7F1D1D;padding:14px;border-radius:10px;"><strong>Unable to render this section.</strong><br>${esc(err.message||err)}</div>`;
  }
}
function _renderDashboardImpl(){
  let ytd=ytdHouseholds();
  let qKey=state.dashboardQuarter||'all';
  let qh=quarterHouseholds(qKey);
  let ytdM=metricsFor(ytd,'all');
  let qM=metricsFor(qh,qKey);
  let ytdOut=outcomeSummary(ytd);
  let qOut=outcomeSummary(qh);
  let qLabel=qKey==='all'?'All FY 2025–26':((REPORT_QUARTERS[qKey]||{}).label+' · '+((REPORT_QUARTERS[qKey]||{}).period||''));
  let dashTab=state.dashTab||'summary';

  document.getElementById('view-dashboard').innerHTML=`<div class="page-head"><div><h1 class="page-title">Dashboard</h1><p class="page-sub">Year-to-date program summary with selected-period detail.</p></div></div>${agencyFilterHtml()}${dashboardFilterHtml()}<div class="metric-note"><strong>Recommended dashboard reading:</strong> Year-to-date shows cumulative FY 2025–26 program activity. The selected-period section shows what happened during the selected quarter or full fiscal year view.</div>

function breakdown(id,opts,h,fn){let total=h.length,counts={};opts.forEach(o=>counts[o]=0);h.forEach(x=>{let v=fn(x);if(counts[v]!=null)counts[v]++});document.getElementById(id).innerHTML=opts.filter(o=>counts[o]).map(o=>`<tr><td>${esc(o)}</td><td>${counts[o]} <span style="color:var(--muted);font-weight:500">(${pct(total?counts[o]/total:0)})</span></td></tr>`).join('')||'<tr><td colspan="2" style="text-align:center;color:var(--muted)">No data yet</td></tr>'}
function drawDash(h){let qs=['Q1 FY26','Q2 FY26','Q3 FY26','Q4 FY26'],counts=qs.map(q=>h.filter(x=>fiscalQuarter(x.intake_date)===q).length),amounts=qs.map(q=>h.filter(x=>fiscalQuarter(x.intake_date)===q).reduce((s,x)=>s+assistTotal(x),0));draw('chartQ','bar',qs,counts,'Households');draw('chartA','line',qs,amounts,'Assistance $')}function draw(id,type,labels,data,label){
  if(state.charts[id]){try{state.charts[id].destroy()}catch(e){}}
  let ctx=document.getElementById(id);
  if(!ctx||typeof Chart==='undefined')return;
  state.charts[id]=new Chart(ctx,{type,data:{labels,datasets:[{label,data,borderWidth:2,backgroundColor:'rgba(37,99,235,.35)',borderColor:'#1B2F5B',tension:.25,fill:type==='line'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}
function chart(id,type,labels,data,label){draw(id,type,labels,data,label)}


function reportSubmissionScope(){
  return isCity() ? (state.reportAgency||'all') : state.profile.agency_id;
}
function currentSubmission(){
  let scope=reportSubmissionScope();
  return (state.submissions||[]).filter(s=>s.report_quarter===state.reportQuarter && s.agency_scope===scope).sort((a,b)=>String(b.submitted_at||b.updated_at||'').localeCompare(String(a.submitted_at||a.updated_at||'')))[0] || null;
}
function submissionStatusHtml(){
  let sub=currentSubmission();
  if(!sub) return `<span class="submission-status draft">Draft / Not Submitted</span>`;
  if((sub.status||'submitted')==='reopened') return `<span class="submission-status draft">Reopened for Revision</span>`;
  return `<span class="submission-status submitted">Submitted ${esc(dateOnly(sub.submitted_at))}</span>`;
}

function submissionCertificationHtml(){
  let sub=currentSubmission();
  if(!sub){
    return `<div class="card" style="margin-top:18px"><div class="card-body"><h2>Submission Certification</h2><p class="muted">This quarterly report has not yet been electronically submitted through the reporting platform.</p></div></div>`;
  }
  return `<div class="card" style="margin-top:18px"><div class="card-body"><h2>Submission Certification</h2><p>This report was electronically submitted through the City of West Hollywood RPHP Reporting Platform.</p><table class="print-table"><tbody><tr><td><strong>Submitted By</strong></td><td>${esc(sub.submitted_by||'—')}</td></tr><tr><td><strong>Agency</strong></td><td>${esc(sub.agency_name||agencyName(sub.agency_scope)||'—')}</td></tr><tr><td><strong>Reporting Quarter</strong></td><td>${esc(sub.report_quarter||'—')}</td></tr><tr><td><strong>Submission Date</strong></td><td>${esc(sub.submitted_at?new Date(sub.submitted_at).toLocaleString():'—')}</td></tr></tbody></table></div></div>`;
}

function submissionPanelHtml(){
  let sub=currentSubmission();
  let disabled = isCity() && (state.reportAgency||'all')==='all';
  let isSubmitted = sub && (sub.status||'submitted')!=='reopened';
  let disabledMsg = disabled ? '<p class="section-intro" style="margin-top:10px">Systemwide reports are for City review and are not submitted as an agency quarterly report. Select APLA or NCJW to submit an agency report.</p>' : '';
  let reopenButton = (isAdmin() && isSubmitted) ? `<button class="btn secondary" onclick="reopenQuarterlyReport()">Reopen Report</button>` : '';
  let submitLabel = sub && (sub.status||'submitted')==='reopened' ? 'Re-submit Quarterly Report' : 'Submit Quarterly Report';
  return `<div class="submission-panel no-print"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><div><strong>Electronic Submission</strong><div style="margin-top:6px">${submissionStatusHtml()}</div></div><div style="display:flex;gap:10px;flex-wrap:wrap">${reopenButton}<button class="btn gold" ${disabled?'disabled':''} onclick="submitQuarterlyReport()">${submitLabel}</button></div></div>${disabledMsg}${sub?`<p class="section-intro" style="margin-top:10px">${(sub.status||'submitted')==='reopened'?'Reopened by':'Submitted by'} ${esc(sub.reopened_by||sub.submitted_by||'—')} on ${esc(sub.reopened_at||sub.submitted_at||'—')}. ${sub.reopen_note?`Reason: ${esc(sub.reopen_note)}. `:''}Submission ID: ${esc(sub.id||'—')}</p>`:''}</div>`;
}
async function reopenQuarterlyReport(){
  if(!isAdmin()){toast('Only City-admin users can reopen submitted reports.','err');return}
  let sub=currentSubmission();
  if(!sub){toast('No submitted report found to reopen.','err');return}
  let note=prompt('Reason for reopening this report for revision?','Corrections requested by City review');
  if(note===null)return;
  let row={...sub,status:'reopened',reopened_at:new Date().toISOString(),reopened_by:state.profile.email,reopen_note:note,updated_at:new Date().toISOString()};
  if(DEMO_MODE){
    state.submissions=(state.submissions||[]).map(s=>s.id===sub.id?row:s);
    await logAct('Reopened quarterly report',sub.report_quarter,sub.agency_scope);
    saveLocal();
    toast('Report reopened for revision','ok');
    renderExport();
    return;
  }
  let {error}=await sb.from('rphp_report_submissions').update({status:'reopened',reopened_at:row.reopened_at,reopened_by:row.reopened_by,reopen_note:note,updated_at:row.updated_at}).eq('id',sub.id);
  if(error){toast('Reopen failed: '+error.message,'err');return}
  await logAct('Reopened quarterly report',sub.report_quarter,sub.agency_scope);
  await loadAll();
  toast('Report reopened for revision','ok');
  renderExport();
}
async function submitQuarterlyReport(){
  let scope=reportSubmissionScope();
  if(isCity() && scope==='all'){toast('Select APLA or NCJW before submitting an agency quarterly report.','err');return}
  let q=REPORT_QUARTERS[state.reportQuarter];
  if(!q){toast('Select a valid reporting quarter.','err');return}
  if(!confirm(`Submit ${q.label} ${q.fy} report for ${agencyName(scope)}? This will record the report as electronically submitted.`))return;
  let base=reportScopedHouseholds();
  let h=base.filter(x=>inReportQuarter(x,state.reportQuarter));
  let ytd=base.filter(x=>inReportQuarter(x,'Q1-2026')||inReportQuarter(x,'Q2-2026')||inReportQuarter(x,'Q3-2026')||inReportQuarter(x,'Q4-2026'));
  let row={
    id: uid('sub'),
    report_quarter: state.reportQuarter,
    agency_scope: scope,
    agency_name: agencyName(scope),
    submitted_by: state.profile.email,
    submitted_at: new Date().toISOString(),
    status: 'submitted',
    reopened_at: null,
    reopened_by: null,
    reopen_note: null,
    updated_at: new Date().toISOString(),
    household_count: h.length,
    ytd_household_count: ytd.length,
    report_payload: {quarter:q,agency_scope:scope,household_count:h.length,household_ids:h.map(x=>x.hh_id)}
  };
  if(DEMO_MODE){
    state.submissions=state.submissions||[];
    state.submissions=state.submissions.filter(s=>!(s.report_quarter===row.report_quarter&&s.agency_scope===row.agency_scope));
    state.submissions.unshift(row);
    await logAct('Submitted quarterly report',state.reportQuarter,scope);
    saveLocal();
    toast('Quarterly report submitted','ok');
    renderExport();
    return;
  }
  let {error}=await sb.from('rphp_report_submissions').upsert(row,{onConflict:'report_quarter,agency_scope'});
  if(error){toast('Submission failed: '+error.message,'err');return}
  await logAct('Submitted quarterly report',state.reportQuarter,scope);
  await loadAll();
  toast('Quarterly report submitted','ok');
  renderExport();
}

function reportScopedHouseholds(){
  let base=scopedHouseholds();
  if(isCity()){
    let agency=state.reportAgency||'all';
    if(agency==='apla'||agency==='ncjw') return state.households.filter(h=>String(h.agency_id).toLowerCase()===agency);
    return state.households;
  }
  return base;
}
function reportScopeLabel(){
  if(isCity()){
    if((state.reportAgency||'all')==='all') return 'Systemwide / All Agencies';
    return agencyName(state.reportAgency);
  }
  return filterLabel();
}

function renderExport(){
  try {
    return _renderExportImpl();
  } catch(err) {
    console.error('renderExport failed', err);
    let el=document.getElementById('view-export');
    if(el) el.innerHTML=`<div class="page-head"><div><h1 class="page-title">Quarterly Program Report Export</h1><p class="page-sub">This section could not load because of a page error.</p></div></div><div class="notice" style="background:#FEE2E2;border:1px solid #FCA5A5;color:#7F1D1D;padding:14px;border-radius:10px;"><strong>Unable to render this section.</strong><br>${esc(err.message||err)}</div>`;
  }
}
function _renderExportImpl(){
  let q=REPORT_QUARTERS[state.reportQuarter]||REPORT_QUARTERS['Q4-2026'];
  let base=reportScopedHouseholds();
  let ytd=base.filter(x=>{
    let fy=fyRange();
    if(betweenDates(x.intake_date,fy.start,fy.end)) return true;
    if(betweenDates(x.assistance_start,fy.start,fy.end)||betweenDates(x.assistance_end,fy.start,fy.end)||overlapsQuarter(x.assistance_start,x.assistance_end,fy)) return true;
    if((x.assistance_log||[]).some(e=>betweenDates(e.date,fy.start,fy.end))) return true;
    if((x.service_log||[]).some(e=>betweenDates(e.date,fy.start,fy.end))) return true;
    return x.intake_date && dateOnly(x.intake_date)<=fy.end && (!x.assistance_end || dateOnly(x.assistance_end)>=fy.start);
  });
  let h=base.filter(x=>inReportQuarter(x,state.reportQuarter));
  let ytdM=metricsFor(ytd,'all'), qM=metricsFor(h,state.reportQuarter);
  let ytdOut=outcomeSummary(ytd), qOut=outcomeSummary(h);

  let noData = h.length===0 ? `<div class="notice" style="margin:18px 0;background:#FEF3C7;border:1px solid #F59E0B;color:#78350F;padding:12px 14px;border-radius:8px;font-size:13px;"><strong>No records found for ${reportScopeLabel()} during ${q.label} ${q.fy}.</strong><br>Records are included when they have an intake date, financial assistance date, service date, or active assistance period between ${q.period}.</div>` : '';

  let agencySummary=(isCity()&&(state.reportAgency||'all')==='all')?`<div class="export-section"><h2>Agency Summary</h2><table class="print-table"><thead><tr><th>Agency</th><th>YTD Households Served</th><th>Quarter Households Served</th><th>Quarter Assistance</th><th>Quarter Service Sessions</th></tr></thead><tbody>${['apla','ncjw'].map(a=>{let ay=base.filter(x=>String(x.agency_id).toLowerCase()===a), aq=ay.filter(x=>inReportQuarter(x,state.reportQuarter));let aqm=metricsFor(aq,state.reportQuarter);return`<tr><td>${agencyName(a)}</td><td>${ay.length}</td><td>${aq.length}</td><td>${money(aqm.assistance)}</td><td>${aqm.services}</td></tr>`}).join('')}</tbody></table></div>`:'';

  document.getElementById('view-export').innerHTML=`<div class="page-head no-print"><div><h1 class="page-title">Quarterly Program Report Export</h1><p class="page-sub">Select the quarter, then print or save as PDF for signature and email submission.</p></div><div class="export-controls"><select onchange="state.reportQuarter=this.value;renderExport()">${Object.entries(REPORT_QUARTERS).map(([k,v])=>`<option value="${k}" ${state.reportQuarter===k?'selected':''}>${v.label} · ${v.period}</option>`).join('')}</select>${isCity()?`<select onchange="state.reportAgency=this.value;renderExport()"><option value="all" ${state.reportAgency==='all'?'selected':''}>Systemwide / All Agencies</option><option value="apla" ${state.reportAgency==='apla'?'selected':''}>APLA</option><option value="ncjw" ${state.reportAgency==='ncjw'?'selected':''}>NCJW</option></select>`:''}<button class="btn" onclick="window.print()">Print / Save PDF</button></div></div><div class="export-page"><div style="display:flex;justify-content:space-between;gap:20px;align-items:flex-start;border-bottom:3px solid var(--gold);padding-bottom:16px"><div><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;font-weight:900;margin:0 0 6px">City of West Hollywood · City of West Hollywood Human Services Division</p><h1 class="export-title">LACAHSA RPHP Quarterly Program Report</h1><p style="margin:4px 0;color:#4b5563">Homelessness Prevention & Housing Stabilization</p></div><div style="text-align:right;font-size:12px;color:#4b5563"><strong>${q.label} · ${q.fy}</strong><br>${q.period}<br>Generated ${new Date().toLocaleDateString()}</div></div>${noData}<div class="report-meta-grid"><div class="report-meta-box"><div class="label" title="Agency or program scope covered by this report.">Reporting scope</div><div class="value">${reportScopeLabel()}</div></div><div class="report-meta-box"><div class="label" title="Fiscal quarter this report covers.">Quarter reported</div><div class="value">${q.period}</div></div><div class="report-meta-box"><div class="label" title="User who generated this report.">Prepared by</div><div class="value">${esc(state.profile.name||state.profile.email)}</div></div></div><div class="report-summary-band"><strong>Report focus:</strong> This report summarizes year-to-date households served and selected-quarter activity, including new intakes, reasons support was requested, financial assistance, service activity, demographics, and housing outcomes.</div>${submissionPanelHtml()}

  <div class="export-section"><h2>1. Year-to-Date Summary</h2><div class="cards" style="grid-template-columns:repeat(4,1fr)"><div class="card kpi"><div class="label" title="Total unique households served so far this fiscal year.">YTD households served</div><div class="value">${ytd.length}</div></div><div class="card kpi"><div class="label" title="Households newly enrolled so far this fiscal year.">YTD new intakes</div><div class="value">${ytdM.newIntakes}</div></div><div class="card kpi"><div class="label" title="Total financial assistance disbursed so far this fiscal year.">YTD assistance</div><div class="value">${money(ytdM.assistance)}</div></div><div class="card kpi"><div class="label" title="Share of households with a known housing outcome who remained stably housed at the 90-day mark.">Stable at 90 days</div><div class="value">${ytdOut.base?pct(ytdOut.stableCount/ytdOut.base):'0%'}</div><div class="sub">${ytdOut.stableCount} of ${ytdOut.base}</div></div></div></div>

  <div class="export-section"><h2>2. Quarterly Activity Summary</h2><p class="section-intro">Operational activity metrics for the selected quarter. These metrics reflect program workflow and activity volume, not housing outcomes.</p><div class="cards" style="grid-template-columns:repeat(4,1fr)"><div class="card kpi"><div class="label" title="Households with activity during the selected quarter.">Households served this quarter</div><div class="value">${h.length}</div></div><div class="card kpi"><div class="label" title="Households newly enrolled during the selected quarter.">New intakes this quarter</div><div class="value">${qM.newIntakes}</div></div><div class="card kpi"><div class="label" title="Households that exited the program during the selected quarter.">Cases closed this quarter</div><div class="value">${qM.closedCases}</div></div><div class="card kpi"><div class="label" title="Total financial assistance disbursed during the selected quarter.">Quarter assistance</div><div class="value">${money(qM.assistance)}</div><div class="sub">${qM.services} service sessions</div></div></div></div>

  ${agencySummary}

  <div class="export-section"><h2>3. Reasons Support Was Requested</h2><table class="print-table"><thead><tr><th>Reason / Qualifying Event</th><th>Households</th></tr></thead><tbody>${supportReasonRows(h)}</tbody></table></div>

function exportScopeHouseholds(scope='all'){
  let h = isCity() ? state.households : state.households.filter(x=>x.agency_id===state.profile.agency_id);
  if(isCity() && scope && scope!=='all') h = h.filter(x=>x.agency_id===scope);
  return h;
}
function exportSafe(v){
  if(v===null||v===undefined) return '';
  if(typeof v==='object') return JSON.stringify(v);
  return String(v);
}
function csvEscape(v){
  v=exportSafe(v);
  return /[",\n\r]/.test(v) ? `"${v.replace(/"/g,'""')}"` : v;
}
function rowsToCsv(rows){
  if(!rows.length) return '';
  let headers=Object.keys(rows[0]);
  return headers.join(',')+'\n'+rows.map(r=>headers.map(h=>csvEscape(r[h])).join(',')).join('\n');
}
function downloadText(filename, content, mime='text/csv;charset=utf-8;'){
  let blob=new Blob([content],{type:mime});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}
function exportFileDate(){return new Date().toISOString().slice(0,10)}
function daysBetween(a,b){
  a=dateOnly(a);
  b=dateOnly(b)||new Date().toISOString().slice(0,10);
  if(!a) return '';
  let ad=new Date(a+'T00:00:00'), bd=new Date(b+'T00:00:00');
  if(isNaN(ad)||isNaN(bd)) return '';
  return Math.max(0,Math.round((bd-ad)/(1000*60*60*24)));
}
function stableLabel(h){
  let s=stable(h);
  if(s==='stable') return 'Yes';
  if(s==='unstable') return 'No';
  return 'Pending';

function recordStatus(h){
  return (h.housing_at_exit||h.assistance_end) ? 'Exited / Closed' : 'Active / Open';
}

function exportDataset(kind,format='csv'){
  let scope=document.getElementById('export-scope')?.value||'all';
  let households=exportScopeHouseholds(scope);
  let rows = kind==='households' ? householdExportRows(households) : kind==='assistance' ? assistanceExportRows(households) : serviceExportRows(households);
  let label=exportAgencyLabel(scope).replace(/[^a-z0-9-]+/gi,'-').toLowerCase();
  if(format==='csv'){
    downloadText(`rphp_${kind}_${label}_${exportFileDate()}.csv`, rowsToCsv(rows));
    return;
  }
  exportExcel(scope, kind);
}
function exportExcel(scope='all', singleKind=null){
  if(typeof XLSX==='undefined'){toast('Excel export library did not load. Try CSV export instead.','err');return;}
  let households=exportScopeHouseholds(scope);
  let wb=XLSX.utils.book_new();
  let addSheet=(rows,name)=>{
    let ws=XLSX.utils.json_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,name);
  };
  if(!singleKind||singleKind==='households') addSheet(householdExportRows(households),'Households');
  if(!singleKind||singleKind==='assistance') addSheet(assistanceExportRows(households),'Assistance Log');
  if(!singleKind||singleKind==='services') addSheet(serviceExportRows(households),'Service Log');
  let label=exportAgencyLabel(scope).replace(/[^a-z0-9-]+/gi,'-').toLowerCase();
  XLSX.writeFile(wb,`rphp_analysis_export_${singleKind||'all'}_${label}_${exportFileDate()}.xlsx`);
}
