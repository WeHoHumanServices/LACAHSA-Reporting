}

// Fiscal Reporting Workspace — monthly invoice generator, agency submissions, City review, and reconciliation checks.
const FISCAL_MONTHS=['April','May','June','July','August','September'];
const FISCAL_MONTH_META={
  April:{start:'2026-04-01',end:'2026-04-30',label:'April 1 – April 30, 2026'},
  May:{start:'2026-05-01',end:'2026-05-31',label:'May 1 – May 31, 2026'},
  June:{start:'2026-06-01',end:'2026-06-30',label:'June 1 – June 30, 2026'},
  July:{start:'2026-07-01',end:'2026-07-31',label:'July 1 – July 31, 2026'},
  August:{start:'2026-08-01',end:'2026-08-31',label:'August 1 – August 31, 2026'},
  September:{start:'2026-09-01',end:'2026-09-30',label:'September 1 – September 30, 2026'}
};
const FISCAL_BUDGETS={program_admin:25000,rental_assistance:150000,total:175000};
const FISCAL_DOC_TYPES=['General Ledger','Payroll Register','Check Register','Receipt / Invoice','Allocation Worksheet','Other Backup'];
const ADMIN_EXPENSE_CATEGORIES=['Personnel','Fringe Benefits','Operating / Supplies','Indirect / Admin Allocation','Other'];
const FISCAL_STORAGE_BUCKET='rphp-fiscal-backup';
function fiscalScope(){return isCity()?(state.fiscalAgency||'ncjw'):state.profile.agency_id}
function fiscalKey(){return fiscalScope()==='all'?'citywide':fiscalScope()}
function defaultFiscal(){return {actuals:{},disbursements:[],submissions:[],documents:[]}}
function fiscalData(scope=fiscalScope()){state.fiscal=state.fiscal||{};let k=scope==='all'?'citywide':scope;if(!state.fiscal[k])state.fiscal[k]=defaultFiscal();return state.fiscal[k]}
function fiscalMonthData(month=state.fiscalMonth,scope=fiscalScope()){let d=fiscalData(scope);d.actuals=d.actuals||{};if(!d.actuals[month])d.actuals[month]={program_admin:0,staff_names:'',titles:'',activities:'',hours:'',admin_expenses:[],households_served_notes:''};if(!Array.isArray(d.actuals[month].admin_expenses))d.actuals[month].admin_expenses=[];return d.actuals[month]}
function fiscalAllAgencyKeys(){return ['apla','ncjw']}
function fiscalAgencyOptions(){return isCity()?`<option value="ncjw" ${state.fiscalAgency==='ncjw'?'selected':''}>NCJW | LA</option><option value="apla" ${state.fiscalAgency==='apla'?'selected':''}>APLA Health</option><option value="all" ${state.fiscalAgency==='all'?'selected':''}>Systemwide fiscal review</option>`:`<option value="${state.profile.agency_id}">${agencyName(state.profile.agency_id)}</option>`}
function fiscalMonthOptions(){return FISCAL_MONTHS.map(m=>`<option value="${m}" ${(state.fiscalMonth||'April')===m?'selected':''}>${m} 2026</option>`).join('')}
function fiscalScopeKeys(scope=fiscalScope()){return scope==='all'?fiscalAllAgencyKeys():[scope]}
function fiscalDisbursements(scope=fiscalScope()){return fiscalScopeKeys(scope).flatMap(k=>(fiscalData(k).disbursements||[]).map(x=>({...x,agency_id:k})))}
function fiscalAdminExpenses(month=state.fiscalMonth,scope=fiscalScope()){return fiscalScopeKeys(scope).flatMap(k=>(fiscalMonthData(month,k).admin_expenses||[]).map(x=>({...x,agency_id:k})))}
function fiscalAdminExpenseTotal(month=state.fiscalMonth,scope=fiscalScope()){return fiscalAdminExpenses(month,scope).reduce((s,e)=>s+Number(e.amount||0),0)}
function fiscalProgramAdminTotal(month,scope=fiscalScope()){return fiscalScopeKeys(scope).reduce((s,k)=>{let md=fiscalMonthData(month,k),detail=fiscalAdminExpenseTotal(month,k);return s+(detail>0?detail:Number(md.program_admin||0))},0)}
function fiscalRentalTotal(month,scope=fiscalScope()){return fiscalDisbursements(scope).filter(d=>d.billing_month===month+' 2026').reduce((s,d)=>s+Number(d.amount||0),0)}
function fiscalMonthTotal(month,scope=fiscalScope()){return fiscalProgramAdminTotal(month,scope)+fiscalRentalTotal(month,scope)}
function fiscalYtdProgram(scope=fiscalScope()){return FISCAL_MONTHS.reduce((s,m)=>s+fiscalProgramAdminTotal(m,scope),0)}
function fiscalYtdRental(scope=fiscalScope()){return FISCAL_MONTHS.reduce((s,m)=>s+fiscalRentalTotal(m,scope),0)}
function fiscalYtdTotal(scope=fiscalScope()){return fiscalYtdProgram(scope)+fiscalYtdRental(scope)}
function fiscalBudget(scope=fiscalScope(),line='total'){let multiplier=scope==='all'?fiscalAllAgencyKeys().length:1;return (FISCAL_BUDGETS[line]||FISCAL_BUDGETS.total)*multiplier}
function fiscalRemaining(line,scope=fiscalScope()){let spent=line==='program_admin'?fiscalYtdProgram(scope):line==='rental_assistance'?fiscalYtdRental(scope):fiscalYtdTotal(scope);return fiscalBudget(scope,line)-spent}
function fiscalPct(line,scope=fiscalScope()){let spent=line==='program_admin'?fiscalYtdProgram(scope):line==='rental_assistance'?fiscalYtdRental(scope):fiscalYtdTotal(scope);let budget=fiscalBudget(scope,line);return budget?pct(spent/budget):'0%'}
function fiscalMonthRange(month=state.fiscalMonth){return FISCAL_MONTH_META[month]||FISCAL_MONTH_META.April}
function programAssistanceTotal(month=state.fiscalMonth,scope=fiscalScope()){let r=fiscalMonthRange(month);return scopedHouseholds().filter(h=>scope==='all'||h.agency_id===scope).reduce((sum,h)=>sum+(h.assistance_log||[]).filter(e=>betweenDates(e.date,r.start,r.end)).reduce((s,e)=>s+Number(e.amount||0),0),0)}
function programHouseholdsWithAssistance(month=state.fiscalMonth,scope=fiscalScope()){let r=fiscalMonthRange(month);return new Set(scopedHouseholds().filter(h=>scope==='all'||h.agency_id===scope).flatMap(h=>(h.assistance_log||[]).filter(e=>betweenDates(e.date,r.start,r.end)).map(e=>h.hh_id))).size}
function fiscalHouseholdsWithDisbursement(month=state.fiscalMonth,scope=fiscalScope()){return new Set(fiscalDisbursements(scope).filter(d=>d.billing_month===month+' 2026'&&d.household_id).map(d=>String(d.household_id).trim())).size}
function fiscalSubmission(scope=fiscalScope(),month=state.fiscalMonth){let d=fiscalData(scope);return (d.submissions||[]).find(x=>x.month===month&&['submitted','approved','reopened'].includes(x.status))}
function reconciliationIssues(scope=fiscalScope(),month=state.fiscalMonth){let issues=[];let fiscalRental=fiscalRentalTotal(month,scope),programRental=programAssistanceTotal(month,scope);if(Math.abs(fiscalRental-programRental)>1)issues.push(`Fiscal rental assistance ${money(fiscalRental)} does not match program assistance log ${money(programRental)}.`);let fHH=fiscalHouseholdsWithDisbursement(month,scope),pHH=programHouseholdsWithAssistance(month,scope);if(fHH!==pHH)issues.push(`Fiscal disbursement household count (${fHH}) does not match program assistance household count (${pHH}).`);if(fiscalMonthTotal(month,scope)<=0)issues.push('Invoice total is $0. Enter actuals or disbursements before submitting.');return issues}
function reconciliationPanel(scope=fiscalScope(),month=state.fiscalMonth){let issues=reconciliationIssues(scope,month);let cls=issues.length?'err':'ok';let label=issues.length?'Reconciliation flag':'Reconciliation clear';let body=issues.length?`<ul style="margin:8px 0 0;padding-left:18px">${issues.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`:`<p style="margin:8px 0 0">Fiscal invoice data aligns with the program assistance log for ${esc(month)}.</p>`;return `<div class="msg ${cls} no-print" style="margin-bottom:16px"><strong>${label}</strong>${body}</div>`}
function monthLabelFromDate(date){if(!date)return'';let x=new Date(date+'T00:00:00');if(isNaN(x))return'';return x.toLocaleString('en-US',{month:'long'})+' '+x.getFullYear()}
function fiscalActualPayload(scope=fiscalScope(),month=state.fiscalMonth){let md=fiscalMonthData(month,scope);let expenses=(md.admin_expenses||[]).map(x=>({id:x.id||uid('adm'),date:cleanDate(x.date),category:x.category||'',employee_vendor:x.employee_vendor||'',description:x.description||'',hours:x.hours||'',gl_account:x.gl_account||'',amount:Number(x.amount||0)}));let total=expenses.reduce((s,x)=>s+Number(x.amount||0),0);return {fiscal_year:FY,agency_id:scope,invoice_month:month,program_admin:total||Number(md.program_admin||0),staff_names:md.staff_names||'',titles:md.titles||'',hours:md.hours||'',activities:md.activities||'',admin_expenses:expenses,households_served_notes:md.households_served_notes||'',updated_by:state.profile.email,updated_at:new Date().toISOString()}}
function fiscalDisbursementPayload(row,scope=fiscalScope()){return {id:row.id||uid('disb'),fiscal_year:FY,agency_id:scope,household_id:row.household_id||'',payee:row.payee||'',billing_month:row.billing_month||((state.fiscalMonth||'April')+' 2026'),payment_date:cleanDate(row.payment_date),assistance_type:row.assistance_type||'',amount:Number(row.amount||0),payment_method:row.payment_method||'',reference_no:row.reference_no||'',updated_by:state.profile.email,updated_at:new Date().toISOString(),created_at:row.created_at||new Date().toISOString()}}
async function loadFiscalData(){state.fiscal={};if(DEMO_MODE){state.fiscal=JSON.parse(localStorage.rphp_fiscal||'{}');return}let [actuals,disbs,subs,docs]=await Promise.all([sb.from('rphp_fiscal_actuals').select('*').order('invoice_month',{ascending:true}),sb.from('rphp_fiscal_disbursements').select('*').order('payment_date',{ascending:false}),sb.from('rphp_fiscal_submissions').select('*').order('submitted_at',{ascending:false}),sb.from('rphp_fiscal_documents').select('*').order('uploaded_at',{ascending:false})]);if(actuals.error||disbs.error||subs.error){console.warn('Fiscal tables not available or blocked by RLS',{actuals:actuals.error,disbursements:disbs.error,submissions:subs.error,documents:docs.error});toast('Fiscal data is not connected yet. Run the fiscal Supabase SQL setup.','err');state.fiscal=JSON.parse(localStorage.rphp_fiscal||'{}');return}(actuals.data||[]).forEach(r=>{let d=fiscalData(r.agency_id);d.actuals[r.invoice_month]={program_admin:Number(r.program_admin||0),staff_names:r.staff_names||'',titles:r.titles||'',hours:r.hours||'',activities:r.activities||'',admin_expenses:Array.isArray(r.admin_expenses)?r.admin_expenses:[],households_served_notes:r.households_served_notes||''}});(disbs.data||[]).forEach(r=>{let d=fiscalData(r.agency_id);d.disbursements.push({id:r.id,household_id:r.household_id||'',payee:r.payee||'',billing_month:r.billing_month||'',payment_date:dateOnly(r.payment_date),assistance_type:r.assistance_type||'',amount:Number(r.amount||0),payment_method:r.payment_method||'',reference_no:r.reference_no||'',created_at:r.created_at})});(subs.data||[]).forEach(r=>{let d=fiscalData(r.agency_id);d.submissions.push({id:r.id,month:r.invoice_month,agency_id:r.agency_id,status:r.status,submitted_by:r.submitted_by,submitted_at:r.submitted_at?new Date(r.submitted_at).toLocaleString():r.submitted_at,total:Number(r.total||0),rental_assistance:Number(r.rental_assistance||0),program_admin:Number(r.program_admin||0),reviewed_by:r.reviewed_by,reviewed_at:r.reviewed_at,reopen_note:r.reopen_note})});if(docs.error){console.warn('Fiscal document table not available or blocked by RLS',docs.error)}else{(docs.data||[]).forEach(r=>{let d=fiscalData(r.agency_id);d.documents=d.documents||[];d.documents.push({id:r.id,month:r.invoice_month,doc_type:r.doc_type,file_name:r.file_name,file_size:r.file_size,mime_type:r.mime_type,storage_path:r.storage_path,uploaded_by:r.uploaded_by,uploaded_at:r.uploaded_at?new Date(r.uploaded_at).toLocaleString():r.uploaded_at})})}} 
async function saveFiscal(){let scope=fiscalScope();if(scope==='all'){toast('Systemwide review is read-only. Select an agency to save fiscal data.','err');return}if(DEMO_MODE){saveLocal();toast('Fiscal reporting saved','ok');return}let actual=fiscalActualPayload(scope,state.fiscalMonth);let {error}=await sb.from('rphp_fiscal_actuals').upsert(actual,{onConflict:'fiscal_year,agency_id,invoice_month'});if(error){toast('Fiscal save failed: '+error.message,'err');return}for(const row of (fiscalData(scope).disbursements||[])){let res=await sb.from('rphp_fiscal_disbursements').upsert(fiscalDisbursementPayload(row,scope),{onConflict:'id'});if(res.error){toast('Disbursement save failed: '+res.error.message,'err');return}}await logAct('Saved fiscal invoice draft',state.fiscalMonth+' 2026',scope);toast('Fiscal reporting saved','ok');await loadFiscalData();renderFiscal()}
async function updateFiscalMonthField(k,v){let m=fiscalMonthData();m[k]=k==='program_admin'?Number(v||0):v;if(DEMO_MODE){saveLocal();renderFiscal();return}let actual=fiscalActualPayload(fiscalScope(),state.fiscalMonth);let {error}=await sb.from('rphp_fiscal_actuals').upsert(actual,{onConflict:'fiscal_year,agency_id,invoice_month'});if(error)toast('Actuals save failed: '+error.message,'err');renderFiscal()}
async function addFiscalDisbursement(){if(fiscalScope()==='all'){toast('Select one agency before adding disbursements.','err');return}let d=fiscalData();d.disbursements=d.disbursements||[];let row={id:uid('disb'),household_id:'',payee:'',billing_month:(state.fiscalMonth||'April')+' 2026',payment_date:'',assistance_type:'Rental Arrears',amount:0,payment_method:'',reference_no:''};d.disbursements.push(row);if(DEMO_MODE){saveLocal();renderFiscal();return}let {error}=await sb.from('rphp_fiscal_disbursements').upsert(fiscalDisbursementPayload(row),{onConflict:'id'});if(error)toast('Could not add disbursement: '+error.message,'err');await loadFiscalData();renderFiscal()}
async function updateFiscalDisbursement(id,k,v){let row=(fiscalData().disbursements||[]).find(x=>x.id===id);if(!row)return;row[k]=k==='amount'?Number(v||0):v;if(k==='payment_date'&&!row.billing_month)row.billing_month=monthLabelFromDate(v);if(DEMO_MODE){saveLocal();renderFiscal();return}let {error}=await sb.from('rphp_fiscal_disbursements').upsert(fiscalDisbursementPayload(row),{onConflict:'id'});if(error)toast('Disbursement save failed: '+error.message,'err');renderFiscal()}
async function deleteFiscalDisbursement(id){let d=fiscalData();d.disbursements=(d.disbursements||[]).filter(x=>x.id!==id);if(DEMO_MODE){saveLocal();renderFiscal();return}let {error}=await sb.from('rphp_fiscal_disbursements').delete().eq('id',id);if(error)toast('Delete failed: '+error.message,'err');await loadFiscalData();renderFiscal()}
async function submitFiscalInvoice(){let scope=fiscalScope(),month=state.fiscalMonth||'April';if(scope==='all'){toast('Systemwide fiscal review cannot be submitted as an agency invoice. Select an agency.','err');return}let issues=reconciliationIssues(scope,month);if(issues.length){toast('Resolve reconciliation flags before submitting.','err');return}if(!fiscalDocsFor(month,scope).length){toast('Upload at least one GL or backup document before submitting.','err');return}await saveFiscal();let row={id:uid('fisub'),fiscal_year:FY,invoice_month:month,agency_id:scope,status:'submitted',submitted_by:state.profile.email,submitted_at:new Date().toISOString(),total:fiscalMonthTotal(month,scope),rental_assistance:fiscalRentalTotal(month,scope),program_admin:fiscalProgramAdminTotal(month,scope),reconciliation_status:'clear',reconciliation_issues:issues,updated_at:new Date().toISOString()};if(DEMO_MODE){let d=fiscalData(scope);d.submissions=d.submissions||[];d.submissions=d.submissions.filter(x=>!(x.month===month&&['submitted','reopened'].includes(x.status)));d.submissions.push({...row,month,submitted_at:new Date().toLocaleString()});saveLocal();toast('Fiscal invoice submitted','ok');renderFiscal();return}let {error}=await sb.from('rphp_fiscal_submissions').upsert(row,{onConflict:'fiscal_year,agency_id,invoice_month'});if(error){toast('Fiscal submission failed: '+error.message,'err');return}await logAct('Submitted fiscal invoice',month+' 2026',scope);toast('Fiscal invoice submitted','ok');await loadFiscalData();renderFiscal()}

function adminExpenseRows(month=state.fiscalMonth,scope=fiscalScope()){let md=fiscalMonthData(month,scope),rows=md.admin_expenses||[];return rows.map((r,i)=>`<tr><td><input type="date" ${dateAttrs()} value="${esc(r.date||'')}" onchange="updateAdminExpense(${i},'date',this.value)"></td><td><select onchange="updateAdminExpense(${i},'category',this.value)"><option></option>${ADMIN_EXPENSE_CATEGORIES.map(x=>`<option value="${esc(x)}" ${r.category===x?'selected':''}>${esc(x)}</option>`).join('')}</select></td><td><input value="${esc(r.employee_vendor||'')}" onchange="updateAdminExpense(${i},'employee_vendor',this.value)"></td><td><textarea onchange="updateAdminExpense(${i},'description',this.value)">${esc(r.description||'')}</textarea></td><td><input value="${esc(r.hours||'')}" onchange="updateAdminExpense(${i},'hours',this.value)"></td><td><input value="${esc(r.gl_account||'')}" onchange="updateAdminExpense(${i},'gl_account',this.value)"></td><td><input type="number" value="${esc(r.amount||0)}" onchange="updateAdminExpense(${i},'amount',this.value)"></td><td><button class="btn danger sm" onclick="deleteAdminExpense(${i})">×</button></td></tr>`).join('')||'<tr><td colspan="8" style="color:var(--muted);padding:18px">No administrative expenses entered.</td></tr>'}
async function addAdminExpense(){if(fiscalScope()==='all'){toast('Select one agency before adding administrative expenses.','err');return}let md=fiscalMonthData();md.admin_expenses=md.admin_expenses||[];md.admin_expenses.push({id:uid('adm'),date:'',category:'Personnel',employee_vendor:'',description:'',hours:'',gl_account:'',amount:0});await updateFiscalMonthField('admin_expenses',md.admin_expenses)}
async function updateAdminExpense(i,k,v){let md=fiscalMonthData();md.admin_expenses=md.admin_expenses||[];if(!md.admin_expenses[i])return;md.admin_expenses[i][k]=k==='amount'?Number(v||0):v;await updateFiscalMonthField('admin_expenses',md.admin_expenses)}
async function deleteAdminExpense(i){let md=fiscalMonthData();md.admin_expenses=md.admin_expenses||[];md.admin_expenses.splice(i,1);await updateFiscalMonthField('admin_expenses',md.admin_expenses)}
function fiscalDocs(scope=fiscalScope()){return fiscalScopeKeys(scope).flatMap(k=>(fiscalData(k).documents||[]).map(x=>({...x,agency_id:k})))}
function fiscalDocsFor(month=state.fiscalMonth,scope=fiscalScope()){return fiscalDocs(scope).filter(d=>d.month===month)}
function formatBytes(n){n=Number(n)||0;if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB'}
function fiscalDocumentHtml(scope=fiscalScope(),month=state.fiscalMonth){let docs=fiscalDocsFor(month,scope);let system=scope==='all';let list=docs.map(d=>`<div class="doc-row"><div><strong>${esc(d.doc_type||'Backup')}</strong> · ${esc(d.file_name||'file')}<div class="meta">${esc(agencyName(d.agency_id))} · ${formatBytes(d.file_size)} · uploaded by ${esc(d.uploaded_by||'—')} on ${esc(d.uploaded_at||'—')}</div></div><div style="display:flex;gap:8px"><button class="btn secondary sm" onclick="openFiscalDocument('${escJs(d.id)}')">Open</button>${system?'':`<button class="btn danger sm" onclick="deleteFiscalDocument('${escJs(d.id)}')">Delete</button>`}</div></div>`).join('')||'<p class="section-intro">No backup documentation uploaded for this month yet.</p>';return `<div class="section no-print"><div class="section-title">Backup Documentation</div><div class="section-body">${system?'<p class="section-intro">Systemwide review shows uploaded fiscal documentation for both agencies.</p>':`<div class="doc-upload-card"><div class="form-grid"><div class="field"><label>Document Type</label><select id="fiscal-doc-type">${FISCAL_DOC_TYPES.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div class="field"><label>Upload GL / Backup File</label><input id="fiscal-doc-file" type="file" accept=".pdf,.xlsx,.xls,.csv"></div></div><button class="btn subtle sm" onclick="uploadFiscalDocument()">Upload Documentation</button><p class="section-intro" style="margin-top:10px">Recommended: upload the monthly GL and any payroll, check-register, receipt, invoice, or allocation backup needed to support the invoice. Suggested max file size: 20 MB.</p></div>`}<div class="doc-list">${list}</div></div></div>`}
async function uploadFiscalDocument(){let scope=fiscalScope(),month=state.fiscalMonth||'April';if(scope==='all'){toast('Select one agency before uploading documentation.','err');return}let input=document.getElementById('fiscal-doc-file'),type=document.getElementById('fiscal-doc-type')?.value||'Other Backup';let file=input?.files?.[0];if(!file){toast('Choose a file to upload.','err');return}let allowed=['application/pdf','text/csv','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet','application/vnd.ms-excel'];let okType=allowed.includes(file.type)||/\.(pdf|csv|xlsx|xls)$/i.test(file.name);if(!okType){toast('Only PDF, XLSX, XLS, and CSV files are allowed.','err');return}if(file.size>20*1024*1024){toast('File is too large. Please keep uploads under 20 MB.','err');return}if(DEMO_MODE){let d=fiscalData(scope);d.documents=d.documents||[];d.documents.unshift({id:uid('doc'),month,doc_type:type,file_name:file.name,file_size:file.size,mime_type:file.type,storage_path:'demo/'+file.name,uploaded_by:state.profile.email,uploaded_at:new Date().toLocaleString()});saveLocal();renderFiscal();return}let safeName=file.name.replace(/[^a-zA-Z0-9._-]+/g,'_');let path=`${FY}/${scope}/${month}/${Date.now()}_${safeName}`;let up=await sb.storage.from(FISCAL_STORAGE_BUCKET).upload(path,file,{upsert:false,contentType:file.type||undefined});if(up.error){toast('Upload failed: '+up.error.message,'err');return}let row={id:uid('doc'),fiscal_year:FY,agency_id:scope,invoice_month:month,doc_type:type,file_name:file.name,file_size:file.size,mime_type:file.type||'',storage_path:path,uploaded_by:state.profile.email,uploaded_at:new Date().toISOString()};let {error}=await sb.from('rphp_fiscal_documents').insert(row);if(error){toast('File uploaded, but metadata save failed: '+error.message,'err');return}await loadFiscalData();toast('Documentation uploaded','ok');renderFiscal()}
async function openFiscalDocument(id){let doc=fiscalDocs('all').find(d=>d.id===id);if(!doc){toast('Document not found.','err');return}if(DEMO_MODE){toast('Demo mode file preview is not available.','err');return}let {data,error}=await sb.storage.from(FISCAL_STORAGE_BUCKET).createSignedUrl(doc.storage_path,60);if(error){toast('Could not open file: '+error.message,'err');return}window.open(data.signedUrl,'_blank')}
async function deleteFiscalDocument(id){let scope=fiscalScope();let doc=fiscalDocs(scope).find(d=>d.id===id);if(!doc){toast('Document not found.','err');return}if(!confirm('Delete uploaded document '+doc.file_name+'?'))return;if(DEMO_MODE){let d=fiscalData(scope);d.documents=(d.documents||[]).filter(x=>x.id!==id);saveLocal();renderFiscal();return}let del=await sb.storage.from(FISCAL_STORAGE_BUCKET).remove([doc.storage_path]);if(del.error){toast('Storage delete failed: '+del.error.message,'err');return}let {error}=await sb.from('rphp_fiscal_documents').delete().eq('id',id);if(error){toast('Metadata delete failed: '+error.message,'err');return}await loadFiscalData();toast('Document deleted','ok');renderFiscal()}
function fiscalSubmissionPanel(){let scope=fiscalScope(),month=state.fiscalMonth||'April',sub=fiscalSubmission(scope,month),issues=reconciliationIssues(scope,month),system=scope==='all';let disabled=system||issues.length||sub?.status==='submitted'||sub?.status==='approved';let label=sub?.status==='submitted'?'Submitted':sub?.status==='approved'?'Approved':'Submit Monthly Invoice';let status=system?'Systemwide review only':sub?`Invoice ${sub.status}`:'Draft invoice';return `<div class="submission-panel no-print"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap"><div><strong>Electronic Submission</strong><div style="margin-top:6px"><span class="submission-status ${sub?'submitted':'draft'}">${esc(status)}</span></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn gold" ${disabled?'disabled':''} onclick="submitFiscalInvoice()">${esc(label)}</button></div></div>${issues.length?'<p class="section-intro" style="margin-top:10px">Submission is locked until reconciliation flags are resolved.</p>':''}${sub?`<p class="section-intro" style="margin-top:10px">Submitted by ${esc(sub.submitted_by||'—')} on ${esc(sub.submitted_at||'—')}. Submission ID: ${esc(sub.id||'—')}</p>`:''}</div>`}
function fiscalReviewRows(scope=fiscalScope()){let rows=FISCAL_MONTHS.map(m=>{let issues=reconciliationIssues(scope,m);let sub=scope==='all'?'—':(fiscalSubmission(scope,m)?.status||'draft');return `<tr><td>${m} 2026</td><td>${money(fiscalProgramAdminTotal(m,scope))}</td><td>${money(fiscalRentalTotal(m,scope))}</td><td>${money(programAssistanceTotal(m,scope))}</td><td>${money(fiscalMonthTotal(m,scope))}</td><td>${fiscalDocsFor(m,scope).length}</td><td>${issues.length?'<span class="status inactive">Flag</span>':'<span class="status exited">Clear</span>'}</td><td>${esc(sub)}</td></tr>`}).join('');return rows}
function fiscalBudgetTable(scope=fiscalScope()){return `<table class="print-table"><thead><tr><th>Budget Line Item</th><th>Budget</th><th>YTD Actuals</th><th>Remaining Balance</th><th>% Spent</th></tr></thead><tbody><tr><td>Program Administration</td><td>${money(fiscalBudget(scope,'program_admin'))}</td><td>${money(fiscalYtdProgram(scope))}</td><td>${money(fiscalRemaining('program_admin',scope))}</td><td>${fiscalPct('program_admin',scope)}</td></tr><tr><td>Rental Assistance</td><td>${money(fiscalBudget(scope,'rental_assistance'))}</td><td>${money(fiscalYtdRental(scope))}</td><td>${money(fiscalRemaining('rental_assistance',scope))}</td><td>${fiscalPct('rental_assistance',scope)}</td></tr><tr><td><strong>TOTAL</strong></td><td><strong>${money(fiscalBudget(scope,'total'))}</strong></td><td><strong>${money(fiscalYtdTotal(scope))}</strong></td><td><strong>${money(fiscalRemaining('total',scope))}</strong></td><td><strong>${fiscalPct('total',scope)}</strong></td></tr></tbody></table>`}
function fiscalInvoiceHtml(){let scope=fiscalScope(),m=state.fiscalMonth||'April',meta=fiscalMonthRange(m),md=fiscalMonthData(m,scope),sub=fiscalSubmission(scope,m),disbs=fiscalDisbursements(scope).filter(d=>d.billing_month===m+' 2026');let detailRows=disbs.map(d=>`<tr><td>${esc(d.household_id||'')}</td><td>${esc(d.payee||'')}</td><td>${esc(d.payment_date||'')}</td><td>${esc(d.assistance_type||'')}</td><td>${money(d.amount)}</td><td>${esc(d.payment_method||'')}</td><td>${esc(d.reference_no||'')}</td></tr>`).join('')||'<tr><td colspan="7">No disbursements listed for this month.</td></tr>';return `<div class="export-page" id="fiscal-invoice"><div style="display:flex;justify-content:space-between;gap:20px;align-items:flex-start;border-bottom:3px solid var(--gold);padding-bottom:16px"><div><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;font-weight:900;margin:0 0 6px">City of West Hollywood · Strategic Initiatives Division</p><h1 class="export-title">${esc(agencyName(scope))} — Monthly RPHP Invoice</h1><p style="margin:4px 0;color:#4b5563">Exhibit G · Agreement No. 011900 · Measure A / LACAHSA RPHP Expansion</p></div><div style="text-align:right;font-size:12px;color:#4b5563"><strong>Invoice #: ${esc((scope==='ncjw'?'NCJW':scope==='apla'?'APLA':'SYS')+'-RPHP-'+m+'-2026')}</strong><br>Invoice Date: ${esc(sub?sub.submitted_at:'Draft (not yet submitted) — '+new Date().toLocaleDateString())}<br>Service Period: ${esc(meta.label)}</div></div><div class="report-meta-grid"><div class="report-meta-box"><div class="label" title="Agency this fiscal record belongs to.">Agency</div><div class="value">${esc(agencyName(scope))}</div></div><div class="report-meta-box"><div class="label" title="Month this invoice covers.">Invoice Month</div><div class="value">${esc(m)} 2026</div></div><div class="report-meta-box"><div class="label" title="User who generated this report.">Prepared by</div><div class="value">${esc(state.profile.name||state.profile.email)}</div></div></div><div class="export-section"><h2>Invoice Summary</h2><table class="print-table"><thead><tr><th>Description</th><th>Detail</th><th>Amount</th></tr></thead><tbody><tr><td>Program Administration</td><td>${esc(md.activities||'Staff time and eligible program administration activities.')} ${md.hours?`<br>Hours: ${esc(md.hours)}`:''}</td><td>${money(fiscalProgramAdminTotal(m,scope))}</td></tr><tr><td>Rental Assistance Reimbursement</td><td>Direct financial assistance paid to landlords, utilities, or verified third parties.</td><td>${money(fiscalRentalTotal(m,scope))}</td></tr><tr><td colspan="2"><strong>TOTAL AMOUNT DUE</strong></td><td><strong>${money(fiscalMonthTotal(m,scope))}</strong></td></tr></tbody></table></div><div class="export-section"><h2>Supporting Disbursement Detail</h2><table class="print-table"><thead><tr><th>Household ID</th><th>Payee</th><th>Payment Date</th><th>Assistance Type</th><th>Amount</th><th>Method</th><th>Reference</th></tr></thead><tbody>${detailRows}</tbody></table></div><div class="export-section"><h2>Program/Fiscal Reconciliation</h2><table class="print-table"><tbody><tr><td>Fiscal rental assistance total</td><td>${money(fiscalRentalTotal(m,scope))}</td></tr><tr><td>Program report assistance log total</td><td>${money(programAssistanceTotal(m,scope))}</td></tr><tr><td>Reconciliation status</td><td>${reconciliationIssues(scope,m).length?'Flagged before submission':'Clear'}</td></tr></tbody></table></div><div class="export-section"><h2>Submission Certification</h2><p style="font-size:12px;line-height:1.6;color:#374151">Electronic submission through the reporting platform serves as the official certification and transmittal record for this invoice.</p><table class="print-table"><tbody><tr><td><strong>Submission Status</strong></td><td>${sub?(sub.status==='approved'?'Approved':'Submitted'):'Draft / Not Submitted'}</td></tr><tr><td><strong>Submitted By</strong></td><td>${esc(sub?.submitted_by||'—')}</td></tr><tr><td><strong>Agency</strong></td><td>${esc(agencyName(scope))}</td></tr><tr><td><strong>Invoice Month</strong></td><td>${esc(m)} 2026</td></tr><tr><td><strong>Submission Date</strong></td><td>${esc(sub?.submitted_at||'—')}</td></tr></tbody></table></div></div>`}
function setFiscalTab(t){state.fiscalTab=t;renderFiscal()}
function renderFiscal(){
  if(!state.fiscalMonth)state.fiscalMonth='April'; if(!state.fiscalAgency)state.fiscalAgency=isCity()?'ncjw':state.profile.agency_id;
  let scope=fiscalScope(),m=state.fiscalMonth,md=fiscalMonthData(m,scope),system=scope==='all',tab=state.fiscalTab||'data';
  let disbs=system?[]:(fiscalData().disbursements||[]);
  let disbRows=disbs.map(r=>`<tr><td><input value="${esc(r.household_id||'')}" onchange="updateFiscalDisbursement('${r.id}','household_id',this.value)"></td><td><input value="${esc(r.payee||'')}" onchange="updateFiscalDisbursement('${r.id}','payee',this.value)"></td><td><select onchange="updateFiscalDisbursement('${r.id}','billing_month',this.value)">${FISCAL_MONTHS.map(x=>`<option value="${x} 2026" ${r.billing_month===x+' 2026'?'selected':''}>${x} 2026</option>`).join('')}</select></td><td><input type="date" ${dateAttrs()} value="${esc(r.payment_date||'')}" onchange="updateFiscalDisbursement('${r.id}','payment_date',this.value)"></td><td><select onchange="updateFiscalDisbursement('${r.id}','assistance_type',this.value)">${ASSISTANCE_TYPE.map(x=>`<option ${r.assistance_type===x?'selected':''}>${esc(x)}</option>`).join('')}</select></td><td><input type="number" value="${esc(r.amount||0)}" onchange="updateFiscalDisbursement('${r.id}','amount',this.value)"></td><td><input value="${esc(r.payment_method||'')}" onchange="updateFiscalDisbursement('${r.id}','payment_method',this.value)"></td><td><input value="${esc(r.reference_no||'')}" onchange="updateFiscalDisbursement('${r.id}','reference_no',this.value)"></td><td><button class="btn danger sm" onclick="deleteFiscalDisbursement('${r.id}')">×</button></td></tr>`).join('')||'<tr><td colspan="9" style="color:var(--muted);padding:18px">No disbursements entered.</td></tr>';
  document.getElementById('view-fiscal').innerHTML=`<div class="page-head no-print"><div><h1 class="page-title">Fiscal Reporting</h1><p class="page-sub">Monthly invoice generation, electronic agency submission, backup documentation, and program/fiscal reconciliation.</p></div><div class="export-controls"><label class="control-label">Agency<select onchange="state.fiscalAgency=this.value;renderFiscal()">${fiscalAgencyOptions()}</select></label><label class="control-label">Month<select onchange="state.fiscalMonth=this.value;renderFiscal()">${fiscalMonthOptions()}</select></label><button class="btn" onclick="saveFiscal()">Save Fiscal Draft</button><button class="btn secondary" ${system?'disabled':''} onclick="window.print()">Print / Save Invoice PDF</button></div></div><div class="report-summary-band no-print"><strong>Monthly fiscal workflow:</strong> enter administrative expense transactions and rental assistance disbursements, upload GL/backup documentation, review budget vs. actuals separately, resolve reconciliation flags against program reporting, then submit the monthly invoice electronically.</div><div class="tabbar no-print"><button class="tabbtn ${tab==='data'?'active':''}" onclick="setFiscalTab('data')">1 &middot; Enter Data &amp; Uploads</button><button class="tabbtn ${tab==='review'?'active':''}" onclick="setFiscalTab('review')">2 &middot; Reconciliation &amp; Budget</button><button class="tabbtn ${tab==='invoice'?'active':''}" onclick="setFiscalTab('invoice')">3 &middot; Invoice Preview</button></div><div class="tabpane" style="display:${tab==='review'?'block':'none'}">${reconciliationPanel(scope,m)}<div class="cards no-print"><div class="card kpi"><div class="label" title="Program administration costs invoiced for this month.">${m} Program Admin</div><div class="value">${money(fiscalProgramAdminTotal(m,scope))}</div></div><div class="card kpi"><div class="label" title="Rental assistance disbursed and invoiced for this month.">${m} Rental Assistance</div><div class="value">${money(fiscalRentalTotal(m,scope))}</div><div class="sub">Program log: ${money(programAssistanceTotal(m,scope))}</div></div><div class="card kpi"><div class="label" title="Total amount invoiced for this month.">${m} Total Invoice</div><div class="value">${money(fiscalMonthTotal(m,scope))}</div></div><div class="card kpi"><div class="label" title="Uploaded GL and backup files for this month.">Backup Files</div><div class="value">${fiscalDocsFor(m,scope).length}</div><div class="sub">Required before submission</div></div></div>${fiscalSubmissionPanel()}</div><div class="tabpane" style="display:${tab==='data'?'block':'none'}"><div class="section no-print"><div class="section-title">Monthly Actuals — Administrative Expense Detail</div><div class="section-body">${system?'<p class="section-intro">Systemwide review is read-only. Select an agency to enter or submit invoice data.</p>':`<p class="section-intro">Enter administrative expenses as auditable transaction lines. The Program Administration total is calculated from the detail below.</p><div class="report-meta-grid"><div class="report-meta-box"><div class="label">Calculated admin total</div><div class="value">${money(fiscalProgramAdminTotal(m,scope))}</div></div><div class="report-meta-box"><div class="label">Expense lines</div><div class="value">${(md.admin_expenses||[]).length}</div></div><div class="report-meta-box"><div class="label">Backup files</div><div class="value">${fiscalDocsFor(m,scope).length}</div></div></div><div class="table-wrap" style="overflow-x:auto"><table class="log-table expense-table" style="min-width:1050px"><thead><tr><th>Date</th><th>Category</th><th>Employee / Vendor</th><th>Description</th><th>Hours</th><th>GL Account</th><th>Amount</th><th></th></tr></thead><tbody>${adminExpenseRows(m,scope)}</tbody><tfoot><tr><td colspan="6"><strong>Total Administrative Expenses</strong></td><td><strong>${money(fiscalProgramAdminTotal(m,scope))}</strong></td><td></td></tr></tfoot></table></div><div style="margin-top:12px"><button class="btn subtle sm" onclick="addAdminExpense()">+ Add admin expense</button></div><div class="form-grid" style="margin-top:16px"><div class="field full"><label>Activities / Description</label><textarea onchange="updateFiscalMonthField('activities',this.value)">${esc(md.activities||'')}</textarea></div></div>`}</div></div>${fiscalDocumentHtml(scope,m)}<div class="section no-print"><div class="section-title">Rental Assistance Disbursement Log</div><div class="section-body">${system?'<p class="section-intro">Systemwide review summarizes all agency disbursements below.</p>':''}<div class="table-wrap" style="overflow-x:auto"><table class="log-table" style="min-width:920px"><thead><tr><th>Household ID</th><th>Landlord / Payee</th><th>Billing Month</th><th>Payment Date</th><th>Assistance Type</th><th>Amount</th><th>Payment Method</th><th>Check # / Ref No.</th><th></th></tr></thead><tbody>${system?fiscalDisbursements('all').map(r=>`<tr><td>${esc(r.household_id||'')}</td><td>${esc(r.payee||'')}</td><td>${esc(r.billing_month||'')}</td><td>${esc(r.payment_date||'')}</td><td>${esc(r.assistance_type||'')}</td><td>${money(r.amount)}</td><td>${esc(r.payment_method||'')}</td><td>${esc(r.reference_no||'')}</td><td>${esc(agencyName(r.agency_id))}</td></tr>`).join('')||'<tr><td colspan="9">No disbursements entered.</td></tr>':disbRows}</tbody></table></div>${system?'':`<div style="margin-top:12px"><button class="btn subtle sm" onclick="addFiscalDisbursement()">+ Add disbursement</button></div>`}</div></div></div><div class="tabpane" style="display:${tab==='review'?'block':'none'}"><div class="grid2 no-print"><div class="card"><div class="card-head"><p class="card-title">Budget vs. Actuals</p></div><div class="card-body">${fiscalBudgetTable(scope)}<p class="section-intro" style="margin-top:10px">Budget vs. Actuals is a separate review screen and is not part of the invoice PDF.</p></div></div><div class="card"><div class="card-head"><p class="card-title">Monthly Fiscal Review</p></div><div class="card-body"><table class="print-table"><thead><tr><th>Month</th><th>Program Admin</th><th>Fiscal Rental</th><th>Program Rental</th><th>Total Invoice</th><th>Backup Files</th><th>Reconciliation</th><th>Submission</th></tr></thead><tbody>${fiscalReviewRows(scope)}</tbody></table></div></div></div></div><div class="tabpane" style="display:${tab==='invoice'?'block':'none'}">${system?'<div class="msg info no-print" style="margin-bottom:0">Systemwide review does not generate a single agency invoice. Select an agency to preview and print its monthly invoice.</div>':fiscalInvoiceHtml()}</div>`;
}
function fiscalDashboardHtml(){let scope=isCity()?state.agencyFilter:state.profile.agency_id;if(scope==='all'&&isCity())scope='all';let m=state.dashboardQuarter==='all'?'September':({'Q1-2026':'September','Q2-2026':'September','Q3-2026':'June','Q4-2026':'September'}[state.dashboardQuarter]||'September');let keys=scope==='all'?['apla','ncjw']:[scope];let rows=keys.map(k=>`<tr><td>${esc(agencyName(k))}</td><td>${money(fiscalYtdTotal(k))}</td><td>${fiscalPct('total',k)}</td><td>${reconciliationIssues(k,m).length?'<span class="status inactive">Flag</span>':'<span class="status exited">Clear</span>'}</td></tr>`).join('');return `<div class="card" style="margin-bottom:16px"><div class="card-head"><p class="card-title">Fiscal Snapshot</p></div><div class="card-body"><p class="section-intro">Fiscal totals are shown alongside program reporting to help identify invoice/program assistance mismatches before review.</p><div class="insight-grid"><div class="insight-card"><div class="label" title="Total fiscal spending so far this fiscal year.">Fiscal YTD actuals</div><div class="value">${money(fiscalYtdTotal(scope))}</div></div><div class="insight-card"><div class="label" title="Rental assistance disbursed so far this fiscal year.">Rental assistance YTD</div><div class="value">${money(fiscalYtdRental(scope))}</div></div><div class="insight-card"><div class="label" title="Program administration costs incurred so far this fiscal year.">Program admin YTD</div><div class="value">${money(fiscalYtdProgram(scope))}</div></div><div class="insight-card"><div class="label" title="Share of total approved budget spent so far this fiscal year.">Budget spent</div><div class="value">${fiscalPct('total',scope)}</div></div></div><table class="print-table"><thead><tr><th>Agency</th><th>YTD Actuals</th><th>Budget Spent</th><th>Current Reconciliation</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}

function renderBackup(){
  if(!canExportData()){
    document.getElementById('view-backup').innerHTML='<div class="page-head"><div><h1 class="page-title">Data Exports</h1><p class="page-sub">You do not have access to this section.</p></div></div>';
    return;
  }
  let scopeOptions=isCity()?`<option value="all">All agencies</option><option value="apla">APLA Health only</option><option value="ncjw">NCJW | LA only</option>`:`<option value="${state.profile.agency_id}">${agencyName(state.profile.agency_id)}</option>`;
  document.getElementById('view-backup').innerHTML=`<div class="page-head"><div><h1 class="page-title">Data Exports</h1><p class="page-sub">Export analysis-ready household, assistance, and service data.</p></div></div><div class="card"><div class="card-body"><div class="toolbar" style="margin:0 0 16px"><div class="filters"><label><strong>Export scope:</strong></label><select id="export-scope">${scopeOptions}</select></div></div><p class="section-intro">Exports include all records within the selected scope, regardless of dashboard or report filters. Agency users are limited to their own agency data. City-admin users can export all agencies or one agency at a time.</p><div class="actions-grid"><button class="action-card" onclick="exportDataset('households','csv')"><p class="action-title">Households CSV</p><p class="action-desc">One row per household with calculated fields for pivot tables.</p></button><button class="action-card" onclick="exportDataset('assistance','csv')"><p class="action-title">Assistance Log CSV</p><p class="action-desc">One row per financial assistance transaction.</p></button><button class="action-card" onclick="exportDataset('services','csv')"><p class="action-title">Service Log CSV</p><p class="action-desc">One row per service entry or case management activity.</p></button><button class="action-card primary" onclick="exportExcel(document.getElementById('export-scope').value)"><p class="action-title">Excel Workbook</p><p class="action-desc">Downloads all three datasets as separate sheets.</p></button></div><div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn secondary" onclick="exportBackupJson()">Download JSON Backup</button></div></div></div>`;
}
init().catch(e=>{console.error(e);document.getElementById('login-msg').className='msg err';document.getElementById('login-msg').textContent=e.message||String(e)});
</script>
</body></html>
